<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fanovera — Croissance social media propulsée par IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --frame: #dde0f5;
    --frame-2: #c9cef0;
    --paper: #fcfbf8;
    --paper-2: #f4f3ee;
    --ink: #1d1d2c;
    --ink-2: #5a5a72;
    --ink-3: #9494a8;
    --primary: #5260e6;
    --primary-2: #6e7aff;
    --primary-soft: #e8eaff;
    --yellow: #f5b800;
    --pink: #ff6b9b;
    --green: #4dbf8a;
    --orange: #ff8a4c;
    --line: #e7e5dd;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background: var(--frame);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: var(--primary); color: white; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

  .script { font-family: 'Caveat', cursive; }

  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

  .paper-frame {
    background: var(--paper);
    border-radius: 32px;
    margin: 24px;
    box-shadow: 0 30px 60px -30px rgba(82, 96, 230, 0.25);
    position: relative;
    overflow: hidden;
  }

  /* Decorative dot pattern */
  .dot-pattern {
    background-image: radial-gradient(circle, var(--frame-2) 1.5px, transparent 1.5px);
    background-size: 16px 16px;
  }

  /* Btn */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    background: var(--primary); color: white;
    border-radius: 999px;
    font-weight: 600; font-size: 15px;
    box-shadow: 0 8px 22px -8px rgba(82, 96, 230, 0.55);
    transition: transform .25s, box-shadow .25s, background .25s;
  }
  .btn-primary:hover { background: var(--primary-2); transform: translateY(-2px); box-shadow: 0 14px 32px -10px rgba(82, 96, 230, 0.65); }

  .btn-soft {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    background: white; color: var(--ink);
    border-radius: 999px;
    font-weight: 600; font-size: 15px;
    border: 1px solid var(--line);
    transition: border-color .2s, transform .2s;
  }
  .btn-soft:hover { border-color: var(--primary); transform: translateY(-2px); }

  /* Pill nav */
  .nav-pill {
    display: inline-flex; align-items: center;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.04);
  }
  .nav-pill a {
    padding: 8px 16px;
    font-size: 14px; font-weight: 500;
    color: var(--ink-2);
    border-radius: 999px;
    transition: background .2s, color .2s;
  }
  .nav-pill a:hover { color: var(--ink); background: var(--paper-2); }

  /* Hero display */
  .display {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800;
    font-size: clamp(40px, 5.4vw, 76px);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }

  /* Hand-drawn underline */
  .squiggle {
    position: relative; display: inline-block;
    color: var(--primary);
  }
  .squiggle::after {
    content: ""; position: absolute;
    left: -2%; right: -2%; bottom: -8px;
    height: 14px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 14' preserveAspectRatio='none'><path d='M2 9 Q 30 1, 60 7 T 120 6 T 198 8' stroke='%235260e6' stroke-width='2.5' fill='none' stroke-linecap='round'/></svg>") no-repeat;
    background-size: 100% 100%;
  }

  /* Network icon button (legacy small) */
  .net-icon {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: white;
    border: 1px solid var(--line);
    display: grid; place-items: center;
    transition: transform .3s, border-color .3s, box-shadow .3s;
    cursor: pointer;
    position: relative;
  }
  .net-icon:hover { transform: translateY(-4px); border-color: var(--primary); }

  /* BIG network poster card — primary hero CTA */
  .netcard {
    --brand: var(--primary);
    --brand-2: var(--primary-2);
    position: relative;
    background: linear-gradient(155deg, var(--brand) 0%, var(--brand-2) 100%);
    border-radius: 24px;
    padding: 22px 20px 20px;
    cursor: pointer;
    transition: transform .4s cubic-bezier(.2,.85,.3,1), box-shadow .35s;
    overflow: hidden;
    display: flex; flex-direction: column;
    min-height: 200px;
    color: white;
    box-shadow: 0 14px 30px -16px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.18);
    isolation: isolate;
  }
  /* Glow ring on hover */
  .netcard::before {
    content:''; position: absolute; inset: -2px;
    border-radius: 26px; z-index: -2;
    background: linear-gradient(155deg, var(--brand), var(--brand-2));
    filter: blur(18px); opacity: 0;
    transition: opacity .4s;
  }
  /* Big background glyph */
  .netcard-glyph {
    position: absolute; right: -24px; bottom: -32px;
    color: white; opacity: 0.13;
    transition: transform .5s cubic-bezier(.2,.85,.3,1), opacity .4s;
    pointer-events: none;
  }
  /* Subtle noise/sheen */
  .netcard::after {
    content:''; position: absolute; inset: 0; border-radius: 24px;
    background: radial-gradient(circle at 20% 0%, rgba(255,255,255,0.22), transparent 55%);
    pointer-events: none;
  }
  .netcard:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 28px 50px -16px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .netcard:hover::before { opacity: 0.55; }
  .netcard:hover .netcard-glyph { transform: translate(-8px, -8px) rotate(-6deg) scale(1.08); opacity: 0.22; }
  .netcard:hover .netcard-arrow { transform: translate(4px, -4px) rotate(-45deg); background: white; color: var(--brand); }

  .netcard > .netcard-row { position: relative; z-index: 1; }

  .netcard-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.25);
    backdrop-filter: blur(8px);
    border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    color: white;
  }
  .netcard-chip.solid {
    background: white; color: var(--brand); border-color: white;
  }
  .netcard-name {
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-top: 14px;
    color: white;
  }
  .netcard-stat {
    font-size: 13px;
    font-weight: 600;
    margin-top: 6px;
    color: rgba(255,255,255,0.85);
  }
  .netcard-foot {
    margin-top: auto;
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 12px;
    position: relative; z-index: 1;
    padding-top: 16px;
  }
  .netcard-cta-label {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.85);
  }
  .netcard-arrow {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(8px);
    display: grid; place-items: center;
    color: white;
    transition: transform .35s cubic-bezier(.2,.85,.3,1), background .3s, color .3s;
    flex-shrink: 0;
  }
  .netcard-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    margin: 12px 0 0;
  }

  /* Floating cards */
  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
    50% { transform: translateY(-10px) rotate(var(--r, 0deg)); }
  }
  .floaty { animation: floaty 5s ease-in-out infinite; }

  /* Mock window */
  .mock-window {
    background: white;
    border-radius: 16px;
    box-shadow: 0 30px 70px -20px rgba(29, 29, 44, 0.25), 0 0 0 1px var(--line);
    overflow: hidden;
  }
  .mock-titlebar {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 14px;
    background: linear-gradient(180deg, #f6f5f0, #ecebe5);
    border-bottom: 1px solid var(--line);
  }
  .traffic { width: 12px; height: 12px; border-radius: 50%; }

  /* Sticker badge */
  .sticker {
    background: white;
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 12px 28px -8px rgba(29, 29, 44, 0.2);
    display: inline-flex; gap: 10px; align-items: center;
  }

  /* Section */
  .section { padding: 100px 0; position: relative; }

  /* Stat tile */
  .stat-tile {
    background: white;
    border-radius: 20px;
    padding: 28px;
    border: 1px solid var(--line);
  }

  /* Step card */
  .step-card {
    background: white;
    border-radius: 24px;
    padding: 32px;
    border: 1px solid var(--line);
    transition: transform .3s, box-shadow .3s;
  }
  .step-card:hover { transform: translateY(-4px); box-shadow: 0 20px 44px -16px rgba(82, 96, 230, 0.18); }

  /* FAQ */
  .faq-item {
    background: white;
    border: 1px solid var(--line);
    border-radius: 18px;
    margin-bottom: 12px;
    padding: 4px 24px;
    transition: border-color .25s, box-shadow .25s;
  }
  .faq-item.open { border-color: var(--primary); box-shadow: 0 12px 28px -16px rgba(82, 96, 230, 0.2); }
  .faq-q { width: 100%; text-align: left; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 24px; font-size: 17px; font-weight: 600; }
  .faq-icon { width: 30px; height: 30px; border-radius: 50%; background: var(--paper-2); display: grid; place-items: center; flex-shrink: 0; transition: all .3s; }
  .faq-item.open .faq-icon { background: var(--primary); color: white; transform: rotate(45deg); }
  .faq-a { overflow: hidden; max-height: 0; transition: max-height .4s, padding .4s; color: var(--ink-2); font-size: 15px; line-height: 1.6; }
  .faq-item.open .faq-a { max-height: 300px; padding-bottom: 22px; }

  /* Logo */
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 19px; letter-spacing: -0.01em;
  }
  .logo-mark {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--primary-2), var(--primary));
    border-radius: 9px;
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 16px;
    box-shadow: 0 4px 10px -2px rgba(82, 96, 230, 0.45);
  }

  @media (max-width: 980px) {
    .hero-grid { grid-template-columns: 1fr !important; }
    .feat-grid { grid-template-columns: 1fr !important; }
    .test-grid { grid-template-columns: 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .net-grid { grid-template-columns: repeat(4, 1fr) !important; }
    .hide-md { display: none !important; }
    .nav-pill { display: none !important; }
    .paper-frame { margin: 12px; }
  }
  @media (max-width: 640px) {
    .net-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
  }

  /* Cloud bottom decoration */
  .cloud-deco {
    position: absolute; left: 0; right: 0; bottom: 0; height: 100px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 100' preserveAspectRatio='none'><path d='M0 100 L0 70 Q 100 40 200 60 Q 320 80 420 50 Q 540 20 660 60 Q 780 90 900 50 Q 1020 20 1200 60 L 1200 100 Z' fill='%23dde0f5' opacity='0.6'/></svg>") no-repeat bottom;
    background-size: 100% 100%;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

const NETWORKS = [
  { id:'instagram', name:'Instagram', color:'#e1407e', icon:'instagram' },
  { id:'tiktok',    name:'TikTok',    color:'#1d1d2c', icon:'tiktok' },
  { id:'youtube',   name:'YouTube',   color:'#ff3a3a', icon:'youtube' },
  { id:'spotify',   name:'Spotify',   color:'#1ed760', icon:'spotify' },
  { id:'twitter',   name:'Twitter',   color:'#1d1d2c', icon:'twitter' },
  { id:'facebook',  name:'Facebook',  color:'#3a6ad4', icon:'facebook' },
  { id:'linkedin',  name:'LinkedIn',  color:'#1d6dc1', icon:'linkedin' },
  { id:'twitch',    name:'Twitch',    color:'#9146ff', icon:'twitch' },
];

function NetIcon({ kind, color, size = 26 }) {
  const s = { fill:'none', stroke: color, strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (kind) {
    case 'instagram': return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" {...s}/><circle cx="12" cy="12" r="4" {...s}/><circle cx="17.5" cy="6.5" r="1.1" fill={color}/></svg>;
    case 'tiktok': return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M14 4v10.5a3.5 3.5 0 1 1-3.5-3.5" {...s}/><path d="M14 4c0 2.5 2 4.5 4.5 4.5" {...s}/></svg>;
    case 'youtube': return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="3" {...s}/><path d="M10 9.5v5l4.5-2.5z" fill={color}/></svg>;
    case 'spotify': return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" {...s}/><path d="M7.5 10c3-1 7-1 9.5 1M8 13c2.5-.8 5-.5 7 1M9 16c1.8-.5 3.5-.3 5 .8" {...s}/></svg>;
    case 'twitter': return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19" {...s}/></svg>;
    case 'facebook': return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" {...s}/><path d="M13.5 21V13h2.5l.5-3h-3V8.2c0-.9.3-1.5 1.6-1.5H17V4.1c-.3 0-1.4-.1-2.5-.1-2.5 0-4 1.4-4 4v2H8v3h2.5v8" {...s}/></svg>;
    case 'linkedin': return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" {...s}/><circle cx="7.5" cy="8" r="1.1" fill={color}/><path d="M7 11v6M11 11v6M11 13.5c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5V17" {...s}/></svg>;
    case 'twitch': return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M5 4h14v10l-4 4h-3l-3 3v-3H5z" {...s}/><path d="M11 8v4M15 8v4" {...s}/></svg>;
  }
}

/* ─── Logo ─── */
function Logo() {
  return (
    <a href="/" className="logo">
      <div className="logo-mark">f</div>
      <span>Fanovera</span>
    </a>
  );
}

/* ─── Header ─── */
function Header() {
  return (
    <div style={{padding:'24px 0'}}>
      <div className="container" style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <Logo />
        <nav className="nav-pill">
          <a href="#how">Comment ça marche</a>
          <a href="#networks">Réseaux</a>
          <a href="#proof">Témoignages</a>
          <a href="#faq">FAQ</a>
          <a href="#contact">Contact</a>
        </nav>
        <div style={{display:'flex', alignItems:'center', gap: 12}}>
          <a href="#login" style={{fontSize: 14, fontWeight: 600}} className="hide-md">Se connecter</a>
          <a href="#start" className="btn-primary" style={{padding:'10px 20px', fontSize: 14}}>
            Commencer
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </a>
        </div>
      </div>
    </div>
  );
}

/* ─── Stars row ─── */
function StarsRow() {
  return (
    <div style={{display:'flex', justifyContent:'center', gap: 56, flexWrap:'wrap', marginBottom: 32}}>
      {[
        { q: "Croissance vraiment naturelle", a: "Léa M., musicienne" },
        { q: "ROI clair en 3 semaines",     a: "Karim T., DTC founder" },
        { q: "Le meilleur ciblage IA testé", a: "Studio Métrique" }
      ].map((t, i) => (
        <div key={i} style={{textAlign:'center'}}>
          <div style={{display:'flex', justifyContent:'center', gap: 3, marginBottom: 6}}>
            {[...Array(5)].map((_, j) => (
              <svg key={j} width="16" height="16" viewBox="0 0 16 16" fill="var(--yellow)"><path d="M8 1l2 4.6 5 .7-3.6 3.5.9 5L8 12.3 3.7 14.8l.9-5L1 6.3l5-.7z"/></svg>
            ))}
          </div>
          <div style={{fontSize: 13, color:'var(--ink-2)', fontStyle:'italic'}}>"{t.q}"</div>
          <div style={{fontSize: 11, color:'var(--ink-3)', marginTop: 2}}>— {t.a}</div>
        </div>
      ))}
    </div>
  );
}

/* ─── Mock dashboard ─── */
function MockDashboard() {
  return (
    <div className="mock-window" style={{width:'100%', maxWidth: 700}}>
      <div className="mock-titlebar">
        <div className="traffic" style={{background:'#ff5f57'}}></div>
        <div className="traffic" style={{background:'#ffbd2e'}}></div>
        <div className="traffic" style={{background:'#28c840'}}></div>
        <div style={{flex:1, textAlign:'center', fontSize:11, color:'var(--ink-3)'}}>app.fanovera.com</div>
      </div>
      <div style={{display:'grid', gridTemplateColumns:'180px 1fr', minHeight: 380}}>
        {/* Sidebar */}
        <div style={{background:'var(--paper-2)', padding:'18px 12px', borderRight:'1px solid var(--line)'}}>
          <div style={{
            background: 'var(--primary)', color:'white',
            padding: '8px 10px', borderRadius: 8,
            fontSize: 12, fontWeight: 600,
            display:'flex', alignItems:'center', gap: 8, marginBottom: 16
          }}>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            + Nouvelle campagne
          </div>
          {['Tableau de bord','Campagnes','Audience IA','Statistiques','Réseaux','Facturation'].map((label, i) => (
            <div key={label} style={{
              padding:'8px 10px', fontSize: 12, fontWeight: i===0 ? 700 : 500,
              color: i===0 ? 'var(--ink)' : 'var(--ink-2)',
              borderRadius: 6, marginBottom: 2,
              background: i===0 ? 'white' : 'transparent'
            }}>{label}</div>
          ))}
          <div style={{marginTop: 18, fontSize: 10, color:'var(--ink-3)', fontWeight:600, letterSpacing:'0.08em', padding:'0 10px'}}>RÉSEAUX ACTIFS</div>
          <div style={{display:'flex', flexWrap:'wrap', gap: 4, padding:'8px 10px'}}>
            {NETWORKS.slice(0,8).map(n => (
              <div key={n.id} style={{width:18, height:18}}>
                <NetIcon kind={n.icon} color={n.color} size={18}/>
              </div>
            ))}
          </div>
        </div>
        {/* Main */}
        <div style={{padding: 20}}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 14}}>
            <div>
              <div style={{fontSize: 14, fontWeight:700}}>Campagne #042</div>
              <div style={{fontSize: 11, color:'var(--ink-3)'}}>Active · Jour 18 sur 30</div>
            </div>
            <div style={{display:'flex', gap: 4}}>
              <div style={{padding:'4px 10px', background:'var(--paper-2)', fontSize: 10, fontWeight:600, borderRadius: 6}}>7j</div>
              <div style={{padding:'4px 10px', background:'var(--ink)', color:'white', fontSize: 10, fontWeight:600, borderRadius: 6}}>30j</div>
              <div style={{padding:'4px 10px', background:'var(--paper-2)', fontSize: 10, fontWeight:600, borderRadius: 6}}>90j</div>
            </div>
          </div>
          {/* Stat cards */}
          <div style={{display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap: 8, marginBottom: 14}}>
            {[
              {l:'Portée', v:'847k', d:'+412%', c:'var(--green)'},
              {l:'Engagement', v:'24,3k', d:'+186%', c:'var(--primary)'},
              {l:'Abonnés', v:'+3 124', d:'+98%', c:'var(--orange)'}
            ].map((s, i) => (
              <div key={i} style={{padding: 12, border:'1px solid var(--line)', borderRadius: 8}}>
                <div style={{fontSize: 10, color:'var(--ink-3)'}}>{s.l}</div>
                <div style={{fontSize: 18, fontWeight:800, marginTop: 2, letterSpacing:'-0.01em'}}>{s.v}</div>
