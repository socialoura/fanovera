<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fanovera — Abonnés Instagram réels & actifs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Caveat:wght@500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --frame: #dde0f5;
    --frame-2: #c9cef0;
    --paper: #fcfbf8;
    --paper-2: #f4f3ee;
    --ink: #1d1d2c;
    --ink-2: #5a5a72;
    --ink-3: #9494a8;
    --primary: #5260e6;
    --primary-2: #6e7aff;
    --primary-soft: #e8eaff;
    --yellow: #f5b800;
    --pink: #ff6b9b;
    --green: #4dbf8a;
    --orange: #ff8a4c;
    --line: #e7e5dd;
    --ig-1: #fa7e1e;
    --ig-2: #d62976;
    --ig-3: #962fbf;
    --ig-4: #4f5bd5;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background: var(--frame);
    color: var(--ink);
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  ::selection { background: var(--primary); color: white; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
  input { font: inherit; color: inherit; }

  .script { font-family: 'Caveat', cursive; }
  .container { max-width: 1240px; margin: 0 auto; padding: 0 32px; }

  .paper-frame {
    background: var(--paper);
    border-radius: 32px;
    margin: 24px;
    box-shadow: 0 30px 60px -30px rgba(82, 96, 230, 0.25);
    position: relative;
    overflow: hidden;
  }

  /* Soft IG gradient halo behind paper-frame */
  .paper-frame::before {
    content:''; position:absolute;
    top: -160px; left: 50%; transform: translateX(-50%);
    width: 720px; height: 360px;
    background: radial-gradient(ellipse at center, rgba(214,41,118,0.15), rgba(79,91,213,0.08) 40%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .paper-frame::after {
    content:''; position:absolute;
    bottom: -120px; right: -80px;
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(250,126,30,0.12), transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .paper-frame > * { position: relative; z-index: 1; }

  .btn-primary {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 26px;
    background: var(--primary); color: white;
    border-radius: 999px;
    font-weight: 600; font-size: 15px;
    box-shadow: 0 8px 22px -8px rgba(82, 96, 230, 0.55);
    transition: transform .25s, box-shadow .25s, background .25s;
    cursor: pointer;
  }
  .btn-primary:hover { background: var(--primary-2); transform: translateY(-2px); box-shadow: 0 14px 32px -10px rgba(82, 96, 230, 0.65); }
  .btn-primary:disabled { background: var(--ink-3); box-shadow: none; cursor: not-allowed; transform: none; }

  .btn-ig {
    background: linear-gradient(135deg, var(--ig-1) 0%, var(--ig-2) 50%, var(--ig-3) 100%);
    box-shadow: 0 8px 22px -8px rgba(214, 41, 118, 0.55);
  }
  .btn-ig:hover { box-shadow: 0 14px 32px -10px rgba(214, 41, 118, 0.65); }

  .btn-soft {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 26px;
    background: white; color: var(--ink);
    border-radius: 999px;
    font-weight: 600; font-size: 15px;
    border: 1px solid var(--line);
    cursor: pointer;
    transition: border-color .2s, transform .2s;
  }
  .btn-soft:hover { border-color: var(--primary); transform: translateY(-2px); }

  .nav-pill {
    display: inline-flex; align-items: center;
    background: white;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.04);
  }
  .nav-pill a {
    padding: 8px 16px;
    font-size: 14px; font-weight: 500;
    color: var(--ink-2);
    border-radius: 999px;
    transition: background .2s, color .2s;
  }
  .nav-pill a:hover { color: var(--ink); background: var(--paper-2); }
  .nav-pill a.active { color: var(--ink); background: var(--paper-2); }

  .display {
    font-weight: 800;
    font-size: clamp(36px, 4.6vw, 64px);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }

  .squiggle {
    position: relative; display: inline-block;
    color: var(--primary);
  }
  .squiggle::after {
    content: ""; position: absolute;
    left: -2%; right: -2%; bottom: -8px;
    height: 14px;
    background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 14' preserveAspectRatio='none'><path d='M2 9 Q 30 1, 60 7 T 120 6 T 198 8' stroke='%235260e6' stroke-width='2.5' fill='none' stroke-linecap='round'/></svg>") no-repeat;
    background-size: 100% 100%;
  }
  .squiggle.ig { color: var(--ig-2); }
  .squiggle.ig::after { background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 14' preserveAspectRatio='none'><path d='M2 9 Q 30 1, 60 7 T 120 6 T 198 8' stroke='%23d62976' stroke-width='2.5' fill='none' stroke-linecap='round'/></svg>") no-repeat; }

  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 19px; letter-spacing: -0.01em;
  }
  .logo-mark {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--primary-2), var(--primary));
    border-radius: 9px;
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 16px;
    box-shadow: 0 4px 10px -2px rgba(82, 96, 230, 0.45);
  }

  /* Stepper */
  .stepper {
    display: flex; align-items: center; gap: 16px;
    background: white; border: 1px solid var(--line);
    border-radius: 999px; padding: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.04);
  }
  .step-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    color: var(--ink-3);
    transition: all .25s;
  }
  .step-pill.done { color: var(--green); }
  .step-pill.active { color: var(--ink); background: var(--paper-2); }
  .step-pill.active .step-num,
  .step-pill.done .step-num { background: var(--ink); color: white; }
  .step-pill.done .step-num { background: var(--green); }
  .step-num {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--paper-2);
    display: grid; place-items: center;
    font-size: 11px; font-weight: 700;
    transition: all .25s;
  }
  .step-divider {
    width: 24px; height: 2px;
    background: var(--line); border-radius: 2px;
  }

  /* Pack tile */
  .pack-tile {
    background: white;
    border: 2px solid var(--line);
    border-radius: 22px;
    padding: 20px 18px 22px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: transform .25s, border-color .25s, box-shadow .25s;
  }
  .pack-tile:hover { transform: translateY(-4px); border-color: var(--ig-3); box-shadow: 0 18px 36px -16px rgba(214, 41, 118, 0.25); }
  .pack-tile.selected {
    border-color: var(--ig-2);
    box-shadow: 0 18px 38px -14px rgba(214, 41, 118, 0.35);
    background: linear-gradient(180deg, #fff 0%, #fff8fb 100%);
  }
  .pack-tile.popular::before {
    content: "★ POPULAIRE";
    position: absolute;
    top: -10px; left: 50%; transform: translateX(-50%);
    padding: 4px 12px;
    background: linear-gradient(135deg, var(--ig-1), var(--ig-2));
    color: white;
    font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
    border-radius: 999px;
    white-space: nowrap;
  }
  .pack-tile.best::before {
    content: "✓ MEILLEUR PRIX/QTÉ";
    position: absolute;
    top: -10px; left: 50%; transform: translateX(-50%);
    padding: 4px 12px;
    background: var(--green); color: white;
    font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* Country toggle card */
  .country-card {
    background: white;
    border: 2px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    cursor: pointer;
    transition: all .25s;
    position: relative;
  }
  .country-card:hover { border-color: var(--ig-3); }
  .country-card.selected {
    border-color: var(--ig-2);
    background: linear-gradient(180deg, #fff 0%, #fff8fb 100%);
  }
  .country-card.selected .check-bubble { background: var(--ig-2); }

  /* Trust list */
  .trust-row {
    display: flex; gap: 10px; align-items: center;
    padding: 12px 0;
    border-bottom: 1px dashed var(--line);
    font-size: 14px;
  }
  .trust-row:last-child { border-bottom: 0; }
  .trust-icon {
    width: 26px; height: 26px; border-radius: 8px;
    display: grid; place-items: center; flex-shrink: 0;
  }

  /* Network icon button */
  .net-icon {
    width: 50px; height: 50px;
    border-radius: 14px;
    background: white;
    border: 1px solid var(--line);
    display: grid; place-items: center;
    transition: transform .3s, border-color .3s;
    cursor: pointer;
  }
  .net-icon:hover { transform: translateY(-3px); border-color: var(--primary); }
  .net-icon.active {
    background: linear-gradient(135deg, var(--ig-1), var(--ig-2));
    border-color: transparent;
  }

  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
    50% { transform: translateY(-10px) rotate(var(--r, 0deg)); }
  }
  .floaty { animation: floaty 5s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }
  .pulse-dot { animation: pulse 1.6s ease-in-out infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    animation: spin .8s linear infinite;
  }

  @keyframes slide-in {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slide-in { animation: slide-in .45s ease-out; }

  /* Section */
  .section { padding: 80px 0; position: relative; }

  /* FAQ */
  .faq-item {
    background: white;
    border: 1px solid var(--line);
    border-radius: 18px;
    margin-bottom: 12px;
    padding: 4px 24px;
    transition: border-color .25s, box-shadow .25s;
  }
  .faq-item.open { border-color: var(--ig-2); box-shadow: 0 12px 28px -16px rgba(214, 41, 118, 0.2); }
  .faq-q { width: 100%; text-align: left; padding: 22px 0; display: flex; justify-content: space-between; align-items: center; gap: 24px; font-size: 17px; font-weight: 600; }
  .faq-icon { width: 30px; height: 30px; border-radius: 50%; background: var(--paper-2); display: grid; place-items: center; flex-shrink: 0; transition: all .3s; }
  .faq-item.open .faq-icon { background: var(--ig-2); color: white; transform: rotate(45deg); }
  .faq-a { overflow: hidden; max-height: 0; transition: max-height .4s, padding .4s; color: var(--ink-2); font-size: 15px; line-height: 1.6; }
  .faq-item.open .faq-a { max-height: 320px; padding-bottom: 22px; }

  /* Form */
  .input-shell {
    background: white;
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 6px 8px 6px 16px;
    display: flex; align-items: center;
    transition: border-color .25s, box-shadow .25s;
  }
  .input-shell:focus-within {
    border-color: var(--ig-2);
    box-shadow: 0 8px 22px -10px rgba(214, 41, 118, 0.35);
  }
  .input-shell input {
    flex: 1; border: 0; outline: 0; padding: 12px 4px;
    font-size: 16px; font-weight: 500; background: transparent;
  }

  /* IG Profile preview card */
  .ig-card {
    background: white;
    border: 1px solid var(--line);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 18px 40px -20px rgba(214, 41, 118, 0.25);
  }
  .ig-card-top {
    background: linear-gradient(135deg, #fff 0%, #fdf3f8 100%);
    padding: 20px;
    display: flex; gap: 16px; align-items: center;
    border-bottom: 1px solid var(--line);
  }
  .ig-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--ig-1), var(--ig-2), var(--ig-3));
    padding: 3px;
    flex-shrink: 0;
  }
  .ig-avatar-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: var(--paper); display: grid; place-items: center;
    font-size: 26px; font-weight: 800;
    color: var(--ig-2);
  }
  .ig-grid-3 {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .ig-tile {
    aspect-ratio: 1;
    background: linear-gradient(135deg, #efefef, #d8d8d8);
    position: relative;
  }

  /* Promo banner */
  .promo-banner {
    background: linear-gradient(90deg, #4f5bd5 0%, #962fbf 33%, #d62976 66%, #fa7e1e 100%);
    color: white;
    padding: 10px 0;
    font-size: 13px; font-weight: 600;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* Why-us card */
  .why-card {
    background: white; border: 1px solid var(--line);
    border-radius: 22px; padding: 28px;
    transition: transform .25s, box-shadow .25s;
  }
  .why-card:hover { transform: translateY(-4px); box-shadow: 0 18px 36px -16px rgba(82, 96, 230, 0.18); }

  /* Review card */
  .review-card {
    background: white; border: 1px solid var(--line);
    border-radius: 18px; padding: 18px;
  }

  /* Floating decorative IG icons */
  .ig-deco {
    position: absolute;
    pointer-events: none;
    opacity: 0.22;
    color: var(--ig-2);
    z-index: 0;
    filter: drop-shadow(0 6px 14px rgba(214, 41, 118, 0.18));
  }
  .ig-deco.tinted-1 { color: var(--ig-1); opacity: 0.22; filter: drop-shadow(0 6px 14px rgba(250, 126, 30, 0.22)); }
  .ig-deco.tinted-2 { color: var(--ig-3); opacity: 0.22; filter: drop-shadow(0 6px 14px rgba(150, 47, 191, 0.22)); }
  .ig-deco.tinted-4 { color: var(--ig-4); opacity: 0.22; filter: drop-shadow(0 6px 14px rgba(79, 91, 213, 0.22)); }
  .ig-deco.bright { opacity: 0.45; }
  .ig-deco svg { stroke-width: 2.2 !important; }
  @keyframes drift-a {
    0%, 100% { transform: translate(0, 0) rotate(var(--rot, 0deg)); }
    33% { transform: translate(8px, -10px) rotate(calc(var(--rot, 0deg) + 4deg)); }
    66% { transform: translate(-6px, 6px) rotate(calc(var(--rot, 0deg) - 3deg)); }
  }
  @keyframes drift-b {
    0%, 100% { transform: translate(0, 0) rotate(var(--rot, 0deg)); }
    50% { transform: translate(-10px, -8px) rotate(calc(var(--rot, 0deg) + 6deg)); }
  }
  .ig-deco.drift-a { animation: drift-a 9s ease-in-out infinite; }
  .ig-deco.drift-b { animation: drift-b 11s ease-in-out infinite; }

  .ig-grad-stroke {
    background: linear-gradient(135deg, var(--ig-1), var(--ig-2), var(--ig-3), var(--ig-4));
    -webkit-background-clip: text;
    background-clip: text;
  }

  /* Sticker */
  .sticker {
    background: white;
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: 0 12px 28px -8px rgba(29, 29, 44, 0.2);
    display: inline-flex; gap: 10px; align-items: center;
  }

  @media (max-width: 980px) {
    .checkout-grid { grid-template-columns: 1fr !important; }
    .pack-grid { grid-template-columns: repeat(2, 1fr) !important; }
    .country-grid { grid-template-columns: 1fr !important; }
    .why-grid { grid-template-columns: 1fr !important; }
    .reviews-grid { grid-template-columns: 1fr 1fr !important; }
    .footer-grid { grid-template-columns: 1fr 1fr !important; }
    .hide-md { display: none !important; }
    .nav-pill { display: none !important; }
    .paper-frame { margin: 12px; }
    .stepper { gap: 6px; padding: 6px; }
    .step-pill { padding: 6px 10px; font-size: 11px; }
    .step-divider { width: 12px; }
  }
  @media (max-width: 640px) {
    .pack-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px !important; }
    .reviews-grid { grid-template-columns: 1fr !important; }
  }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo } = React;

/* ─── Networks ─── */
const NETWORKS = [
  { id:'instagram', name:'Instagram', icon:'instagram' },
  { id:'tiktok',    name:'TikTok',    icon:'tiktok' },
  { id:'youtube',   name:'YouTube',   icon:'youtube' },
  { id:'spotify',   name:'Spotify',   icon:'spotify' },
  { id:'twitter',   name:'Twitter',   icon:'twitter' },
  { id:'facebook',  name:'Facebook',  icon:'facebook' },
  { id:'linkedin',  name:'LinkedIn',  icon:'linkedin' },
  { id:'twitch',    name:'Twitch',    icon:'twitch' },
];

function NetIcon({ kind, color = 'currentColor', size = 22 }) {
  const s = { fill:'none', stroke: color, strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (kind) {
    case 'instagram': return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5" {...s}/><circle cx="12" cy="12" r="4" {...s}/><circle cx="17.5" cy="6.5" r="1.1" fill={color}/></svg>;
    case 'tiktok': return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M14 4v10.5a3.5 3.5 0 1 1-3.5-3.5" {...s}/><path d="M14 4c0 2.5 2 4.5 4.5 4.5" {...s}/></svg>;
    case 'youtube': return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="2.5" y="6" width="19" height="12" rx="3" {...s}/><path d="M10 9.5v5l4.5-2.5z" fill={color}/></svg>;
    case 'spotify': return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" {...s}/><path d="M7.5 10c3-1 7-1 9.5 1M8 13c2.5-.8 5-.5 7 1M9 16c1.8-.5 3.5-.3 5 .8" {...s}/></svg>;
    case 'twitter': return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19" {...s}/></svg>;
    case 'facebook': return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" {...s}/><path d="M13.5 21V13h2.5l.5-3h-3V8.2c0-.9.3-1.5 1.6-1.5H17V4.1c-.3 0-1.4-.1-2.5-.1-2.5 0-4 1.4-4 4v2H8v3h2.5v8" {...s}/></svg>;
    case 'linkedin': return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3" {...s}/><circle cx="7.5" cy="8" r="1.1" fill={color}/><path d="M7 11v6M11 11v6M11 13.5c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5V17" {...s}/></svg>;
    case 'twitch': return <svg width={size} height={size} viewBox="0 0 24 24"><path d="M5 4h14v10l-4 4h-3l-3 3v-3H5z" {...s}/><path d="M11 8v4M15 8v4" {...s}/></svg>;
  }
}

/* ─── Pack data ─── */
const PACKS = [
  { qty: 100,    price: 2.79,  old: 9.99,   bonus: 25 },
  { qty: 250,    price: 5.49,  old: 14.99,  bonus: 50 },
  { qty: 500,    price: 8.99,  old: 24.99,  bonus: 100 },
  { qty: 1000,   price: 14.99, old: 39.99,  bonus: 200, popular: true },
  { qty: 2500,   price: 32.99, old: 84.99,  bonus: 500 },
  { qty: 5000,   price: 59.99, old: 149.99, bonus: 1000 },
  { qty: 10000,  price: 109.99,old: 269.99, bonus: 2500 },
  { qty: 25000,  price: 249.99,old: 599.99, bonus: 6000 },
  { qty: 50000,  price: 449.99,old: 1099.99,bonus: 12500, best: true },
  { qty: 100000, price: 799.99,old: 1999.99,bonus: 25000 }
];

/* ─── Promo Banner ─── */
function PromoBanner() {
  const [time, setTime] = useState({ h: 0, m: 14, s: 32 });
  useEffect(() => {
    const id = setInterval(() => {
      setTime(t => {
        let { h, m, s } = t;
        s--; if (s < 0) { s = 59; m--; }
        if (m < 0) { m = 59; h--; }
        if (h < 0) { h = 0; m = 14; s = 32; }
        return { h, m, s };
      });
    }, 1000);
    return () => clearInterval(id);
  }, []);
  const pad = n => String(n).padStart(2, '0');
  return (
    <div className="promo-banner">
      <div style={{display:'flex', justifyContent:'center', alignItems:'center', gap: 16, flexWrap:'wrap', padding:'0 16px'}}>
        <span style={{fontWeight: 700}}>★ Offre spéciale</span>
        <span>Code <span style={{background:'rgba(255,255,255,0.2)', padding:'2px 10px', borderRadius: 999, fontWeight: 800, letterSpacing:'0.05em'}}>FANO5</span> · −5% sur tout</span>
        <div style={{display:'flex', gap: 4, fontFamily:'monospace', fontWeight: 700}}>
          <span style={{background:'rgba(0,0,0,0.25)', padding:'2px 8px', borderRadius: 6}}>{pad(time.h)}h</span>
          <span style={{background:'rgba(0,0,0,0.25)', padding:'2px 8px', borderRadius: 6}}>{pad(time.m)}m</span>
          <span style={{background:'rgba(0,0,0,0.25)', padding:'2px 8px', borderRadius: 6}}>{pad(time.s)}s</span>
        </div>
      </div>
    </div>
  );
}

/* ─── Stepper ─── */
function Stepper({ step }) {
  const steps = [
    { n: 1, label: 'Choisir un pack' },
    { n: 2, label: 'Votre Instagram' },
    { n: 3, label: 'Paiement sécurisé' }
  ];
  return (
    <div style={{display:'flex', justifyContent:'center', marginBottom: 28}}>
      <div className="stepper">
        {steps.map((s, i) => (
          <React.Fragment key={s.n}>
            <div className={`step-pill ${step === s.n ? 'active' : ''} ${step > s.n ? 'done' : ''}`}>
              <span className="step-num">
                {step > s.n ? (
                  <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 4.5-5" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
                ) : s.n}
              </span>
              {s.label}
            </div>
            {i < steps.length - 1 && <div className="step-divider"></div>}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
}

/* ═════════════ STEP 2: USERNAME ═════════════ */

  useEffect(() => {
    setVerified(false);
    if (!valid) return;
    setVerifying(true);
    const id = setTimeout(() => {
      setVerifying(false);
      setVerified(true);

    return () => { clearTimeout(id); setVerifying(false); };

/* ═════════════ APP ═════════════ */
/* Decorative floating IG icons sprinkled in a section */
function IgSprinkle({ count = 6, seed = 0 }) {
  // Deterministic positions per seed
  const positions = [
    { top: '6%',  left: '4%',  size: 56,  rot: -14, anim: 'drift-a', tint: '' },
    { top: '14%', right: '5%', size: 72,  rot: 10,  anim: 'drift-b', tint: 'tinted-1' },
    { top: '42%', left: '2%',  size: 44,  rot: 18,  anim: 'drift-b', tint: 'tinted-4' },
    { top: '52%', right: '2%', size: 64,  rot: -8,  anim: 'drift-a', tint: 'tinted-2' },
    { top: '78%', left: '6%',  size: 50,  rot: 4,   anim: 'drift-a', tint: 'tinted-1' },
    { top: '86%', right: '7%', size: 40,  rot: -20, anim: 'drift-b', tint: '' },
    { top: '24%', left: '11%', size: 32,  rot: 22,  anim: 'drift-b', tint: 'tinted-2' },
    { top: '64%', right: '12%',size: 36,  rot: -16, anim: 'drift-a', tint: 'tinted-4' }
  ];
  const start = seed % positions.length;
  const items = [];
  for (let i = 0; i < count; i++) items.push(positions[(start + i) % positions.length]);
  return (
    <>
      {items.map((p, i) => (
        <div key={i} className={`ig-deco ${p.anim} ${p.tint}`}
          style={{ top: p.top, left: p.left, right: p.right, '--rot': p.rot + 'deg' }}>
          <NetIcon kind="instagram" color="currentColor" size={p.size}/>
        </div>
      ))}
    </>
  );
}

function App() {
  const [step, setStep] = useState(1);
  const [country, setCountry] = useState('fr');
  const [pack, setPack] = useState(3); // popular default
  const [username, setUsername] = useState('');

  const next = () => { setStep(s => Math.min(3, s + 1)); window.scrollTo({ top: 0, behavior: 'smooth' }); };
  const back = () => { setStep(s => Math.max(1, s - 1)); window.scrollTo({ top: 0, behavior: 'smooth' }); };

  return (
    <>
      <PromoBanner />
      <div className="paper-frame">
        <Header />
        {step === 1 && <Step1Packs country={country} setCountry={setCountry} pack={pack} setPack={setPack} onNext={next}/>}
        {step === 2 && <Step2Username country={country} pack={pack} username={username} setUsername={setUsername} onNext={next} onBack={back}/>}
        {step === 3 && <Step3Checkout country={country} pack={pack} username={username} onBack={back}/>}
      </div>
      <WhyUs />
      <Reviews />
      <FAQ />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
